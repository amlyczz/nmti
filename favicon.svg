<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F472B6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0F0F1A"/>
  <rect x="4" y="4" width="56" height="56" rx="10" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.8"/>
  <text x="32" y="42" font-family="monospace" font-size="24" font-weight="900" text-anchor="middle" fill="url(#grad)" filter="url(#glow)">NMTI</text>
</svg>
