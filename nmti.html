  <style>
@import 'nmtwind.css';

:root {
  --primary: #8B5CF6;
  --secondary: #06B6D4;
  --accent: #F472B6;
  --bg: #0F0F1A;
  --surface: #1A1A2E;
  --text: #F8FAFC;
  --text-secondary: #94A3B8;
  --orange: #F59E0B;
  --red: #EF4444;
}
* { box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
.font-cyber { font-family: 'Orbitron', monospace; }

.neon-purple { text-shadow: 0 0 10px var(--primary), 0 0 30px var(--primary), 0 0 60px var(--primary); }
.neon-cyan { text-shadow: 0 0 10px var(--secondary), 0 0 30px var(--secondary); }
.neon-pink { text-shadow: 0 0 10px var(--accent), 0 0 30px var(--accent); }
.neon-orange { text-shadow: 0 0 10px var(--orange), 0 0 30px var(--orange); }
.neon-red { text-shadow: 0 0 10px var(--red), 0 0 30px var(--red); }

.glow-border {
  box-shadow: 0 0 15px rgba(139, 92, 246, 0.3), inset 0 0 15px rgba(139, 92, 246, 0.1);
  border: 1px solid rgba(139, 92, 246, 0.5);
}
.glass {
  background: rgba(26, 26, 46, 0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 5px var(--primary), 0 0 20px var(--primary); }
  50% { box-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary); }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}
.animate-fadeInUp { animation: fadeInUp 0.4s ease-out forwards; }
.animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
.animate-float { animation: float 3s ease-in-out infinite; }
.animate-slideIn { animation: slideIn 0.3s ease-out forwards; }

.option-btn {
  transition: all 0.2s ease;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
}
.option-btn:hover {
  border-color: var(--primary);
  box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
  transform: scale(1.02);
}
.option-btn.selected {
  background: rgba(139, 92, 246, 0.3);
  border-color: var(--primary);
  box-shadow: 0 0 25px rgba(139, 92, 246, 0.5);
}

.progress-fill {
  transition: width 0.4s ease;
  background: linear-gradient(90deg, var(--primary), var(--accent));
}

.tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 9999px;
  font-size: 0.75rem;
  margin: 4px;
  animation: fadeInUp 0.3s ease-out forwards;
  opacity: 0;
}

.result-letter {
  font-size: clamp(2.5rem, 10vw, 5rem);
  font-weight: 900;
  display: inline-block;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

.radar-chart {
  width: 280px;
  height: 280px;
  margin: 0 auto;
}
  </style>

      return Math.round(((1 - b.E) * 0.5 + (1 - b.V) * 0.3 + (1 - b.P) * 0.2) * 100);
    }

    function getTriggers() {
      const f = state.fingerprint;
      const triggers = [];

      if (f.S4 > 85 && f.I4 < 20) {
        triggers.push('你不仅被生活磨平了棱角，甚至还在帮生活数钱。');
      }
      if (f.A4 > 90 && f.C1 < 30) {
        triggers.push('你所谓的摆烂其实是由于太害怕失败，所以你干脆连入场的机会都不给自己。');
      }
      if (f.C4 > 80 && f.S2 > 80) {
        triggers.push('你看着网上的人群吵架就像看猴子杂耍，虽然你在笑，但你其实觉得这些笑声也毫无意义。');
      }

      return triggers;
    }

    // ============ 渲染函数 ============
    function render() {
      const app = document.getElementById('app');
      if (state.phase === 'cover') {
        app.innerHTML = renderCover();
      } else if (state.phase === 'test') {
        app.innerHTML = renderTest();
      } else if (state.phase === 'result') {
        app.innerHTML = renderResult();
      }
      attachEvents();
    }

    function renderCover() {
      return `
        <div class="min-h-screen flex flex-col items-center justify-center px-4 py-8 relative overflow-hidden">
          <div class="absolute inset-0 overflow-hidden">
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-500/20 rounded-full blur-3xl animate-float"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-pink-500/20 rounded-full blur-3xl animate-float" style="animation-delay: 1s"></div>
            <div class="absolute top-1/2 right-1/3 w-64 h-64 bg-cyan-500/10 rounded-full blur-3xl animate-float" style="animation-delay: 2s"></div>
          </div>

          <div class="relative z-10 text-center max-w-lg mx-auto animate-fadeInUp">
            <div class="mb-4">
              <span class="text-5xl md:text-7xl font-cyber font-black neon-purple">NMTI</span>
            </div>
            <p class="text-xs font-cyber text-cyan-400 mb-4 neon-cyan">Abstract-3.0</p>
            <h1 class="text-lg md:text-xl font-cyber text-gray-300 mb-2">赛博精神病确诊中心</h1>
            <p class="text-gray-500 mb-8 text-sm">
              基于16维指纹映射的赛博病历单<br>
              主打一个测完破防，精准拿捏
            </p>

            <button id="startBtn" class="px-8 py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-full font-bold text-lg animate-pulse-glow hover:scale-105 transition-transform cursor-pointer border-0">
              开始确诊 →
            </button>

            <p class="mt-6 text-gray-600 text-xs">32道题 · 4大维度 · 16维指纹</p>
          </div>
        </div>
      `;
    }

    function renderTest() {
      const q = state.testQuestions[state.currentQuestion];
      const progress = (state.currentQuestion / 32) * 100;
      const dimLabels = { P: '互动', V: '内核', I: '表达', E: '生存' };
      const dimColors = { P: 'purple', V: 'cyan', I: 'pink', E: 'orange' };
      const color = dimColors[q.dimension];

      return `
        <div class="min-h-screen flex flex-col px-3 py-4 md:px-6 md:py-6">
          <div class="mb-4">
            <div class="flex items-center gap-3 mb-3">
              <div class="flex-1 h-2 bg-gray-800 rounded-full overflow-hidden">
                <div class="progress-fill h-full rounded-full" style="width: ${progress}%"></div>
              </div>
              <span class="text-xs text-gray-500 font-cyber">${Math.round(progress)}%</span>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-xs text-${color}-400">${dimLabels[q.dimension]}维度</span>
              <span class="text-xs text-gray-600">${state.currentQuestion + 1}/32</span>
            </div>
          </div>

          <div class="flex-1 flex items-center justify-center">
            <div class="w-full max-w-lg">
              <div class="glass glow-border rounded-2xl p-5 md:p-6 animate-fadeInUp">
                <h2 class="text-lg md:text-xl font-semibold mb-6 leading-relaxed text-gray-100">
                  ${q.text}
                </h2>
                <div class="space-y-3">
                  ${['A', 'B', 'C'].map((opt, idx) => {
                    const colors = ['text-purple-400', 'text-cyan-400', 'text-pink-400'];
                    const texts = [q.A, q.B, q.C];
                    return `
                      <button class="option-btn w-full text-left px-4 py-3 rounded-xl text-sm md:text-base ${colors[idx]} transition-all" data-option="${idx}">
                        <span class="font-cyber font-bold mr-2">${opt}.</span>
                        ${texts[idx]}
                      </button>
                    `;
                  }).join('')}
                </div>
              </div>
            </div>
          </div>

          <div class="flex items-center justify-between mt-4 px-4">
            <button id="prevBtn" class="text-xs text-gray-500 hover:text-purple-400 transition-colors ${state.currentQuestion === 0 ? 'opacity-0 pointer-events-none' : ''}">← 上一题</button>
            <span class="text-xs text-gray-600">选择后自动进入下一题</span>
          </div>
        </div>
      `;
    }

    function renderResult() {
      const resultCode = calculateResult();
      const p = personalities[resultCode];
      const niuMa = calculateNiuMa();
      const triggers = getTriggers();
      const colors = ['neon-purple', 'neon-cyan', 'neon-pink', 'neon-orange'];

      let codeHtml = resultCode.split('').map((l, i) => `<span class="result-letter font-cyber ${colors[i]}">${l}</span>`).join('');

      return `
        <div class="min-h-screen overflow-y-auto pb-12">
          <div class="px-4 py-8 md:py-12 text-center">
            <p class="text-gray-500 text-sm mb-2 animate-fadeInUp">NMTI 赛博精神状态确诊报告</p>
            <div class="mb-2 animate-fadeInUp" style="animation-delay: 0.1s">${codeHtml}</div>
            <h1 class="text-2xl md:text-3xl font-cyber font-bold neon-purple animate-fadeInUp" style="animation-delay: 0.2s">
              ${p.emoji} ${p.name}
            </h1>
          </div>

          <div class="max-w-lg mx-auto px-4 space-y-6">
            <!-- 16维指纹 -->
            <div class="glass glow-border rounded-2xl p-5 animate-fadeInUp" style="animation-delay: 0.3s">
              <h3 class="text-sm text-gray-400 mb-4 flex items-center gap-2">
                <span>📊</span> 16维指纹
              </h3>
              <div class="grid grid-cols-2 gap-3 text-xs">
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">自我确信度</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-purple-500 rounded-full" style="width: ${state.fingerprint.C1}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">意义渴求度</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-cyan-500 rounded-full" style="width: ${state.fingerprint.C2}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">道德敏感度</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-pink-500 rounded-full" style="width: ${state.fingerprint.C3}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">虚无主义边界</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-orange-500 rounded-full" style="width: ${state.fingerprint.C4}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">社交表达欲</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-purple-500 rounded-full" style="width: ${state.fingerprint.S1}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">情感剥离度</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-cyan-500 rounded-full" style="width: ${state.fingerprint.S2}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">人际结界厚度</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-pink-500 rounded-full" style="width: ${state.fingerprint.S3}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">赛博共情力</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-orange-500 rounded-full" style="width: ${state.fingerprint.S4}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">逻辑强迫症</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-purple-500 rounded-full" style="width: ${state.fingerprint.I1}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">抽象感染力</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-cyan-500 rounded-full" style="width: ${state.fingerprint.I2}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">观点固化度</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-pink-500 rounded-full" style="width: ${state.fingerprint.I3}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">伪装熟练度</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-orange-500 rounded-full" style="width: ${state.fingerprint.I4}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">赛博攻击性</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-purple-500 rounded-full" style="width: ${state.fingerprint.A1}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">情绪自愈力</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-cyan-500 rounded-full" style="width: ${state.fingerprint.A2}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">秩序破坏欲</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-pink-500 rounded-full" style="width: ${state.fingerprint.A3}%"></div>
                  </div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-2">
                  <div class="text-gray-500 mb-1">摆烂执行力</div>
                  <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-orange-500 rounded-full" style="width: ${state.fingerprint.A4}%"></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- 扎心画像 -->
            <div class="glass glow-border rounded-2xl p-5 animate-fadeInUp" style="animation-delay: 0.5s">
              <h3 class="text-sm text-gray-400 mb-3 flex items-center gap-2">
                <span>📝</span> 确诊画像
              </h3>
              <p class="text-gray-200 leading-relaxed text-sm">${p.profile}</p>
              ${triggers.length > 0 ? `
                <div class="mt-4 pt-4 border-t border-gray-700">
                  ${triggers.map(t => `<p class="text-red-400 text-sm mb-2">💀 ${t}</p>`).join('')}
                </div>
              ` : ''}
            </div>

            <!-- 牛马指数 -->
            <div class="glass glow-border rounded-2xl p-5 animate-fadeInUp" style="animation-delay: 0.6s">
              <h3 class="text-sm text-gray-400 mb-3 flex items-center gap-2">
                <span>🐴</span> 牛马指数
              </h3>
              <div class="mb-3">
                <div class="flex justify-between text-xs text-gray-500 mb-1">
                  <span>打工魂</span>
                  <span class="text-orange-400 font-bold">${niuMa}%</span>
                </div>
                <div class="h-3 bg-gray-800 rounded-full overflow-hidden">
                  <div class="h-full bg-gradient-to-r from-orange-500 to-red-500 rounded-full transition-all duration-1000" id="niuMaBar" style="width: 0%"></div>
                </div>
              </div>
            </div>

            <!-- 社交关系 -->
            <div class="glass glow-border rounded-2xl p-5 animate-fadeInUp" style="animation-delay: 0.7s">
              <h3 class="text-sm text-gray-400 mb-3 flex items-center gap-2">
                <span>🔗</span> 社交关系
              </h3>
              <div class="space-y-3">
                <div class="flex items-start gap-3">
                  <span class="text-green-400">💕</span>
                  <div>
                    <div class="text-xs text-gray-500 mb-1">天命牛马</div>
                    <div class="text-sm">${p.match} — ${personalities[p.match].name}</div>
                  </div>
                </div>
                <div class="flex items-start gap-3">
                  <span class="text-red-400">⚔️</span>
                  <div>
                    <div class="text-xs text-gray-500 mb-1">命中克星</div>
                    <div class="text-sm">${p.rival} — ${personalities[p.rival].name}</div>
                  </div>
                </div>
              </div>
            </div>

            <button id="restartBtn" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-full font-bold text-lg hover:scale-[1.02] transition-transform cursor-pointer border-0 animate-fadeInUp" style="animation-delay: 0.8s">
              🔄 重新确诊
            </button>
          </div>
        </div>
      `;
    }

    function attachEvents() {
      const startBtn = document.getElementById('startBtn');
      if (startBtn) {
        startBtn.addEventListener('click', () => {
          state.phase = 'test';
          state.testQuestions = prepareQuestions();
          render();
        });
      }

      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          handleAnswer(parseInt(btn.dataset.option));
        });
      });

      const prevBtn = document.getElementById('prevBtn');
      if (prevBtn) {
        prevBtn.addEventListener('click', () => {
          if (state.currentQuestion > 0) {
            // 恢复上一题分数
            const prevQ = state.testQuestions[state.currentQuestion - 1];
            const prevAnswer = state.answers[state.currentQuestion - 1];
            if (prevAnswer !== null) {
              const dim = prevQ.dimension;
              const letterMap = { P: ['E', 'I'], V: ['S', 'D'], I: ['R', 'M'], E: ['A', 'B'] };
              if (prevAnswer === 0) {
                state.scores[letterMap[dim][0]]--;
                state.rawScores[`nA_${dim}`]--;
              } else if (prevAnswer === 1) {
                state.scores[letterMap[dim][1]]--;
                state.rawScores[`nB_${dim}`]--;
              }
            }
            state.currentQuestion--;
            document.getElementById('app').innerHTML = renderTest();
            attachEvents();
          }
        });
      }

      const restartBtn = document.getElementById('restartBtn');
      if (restartBtn) {
        restartBtn.addEventListener('click', () => {
          state.currentQuestion = 0;
          state.answers = new Array(32).fill(null);
          state.scores = { E: 0, I: 0, S: 0, D: 0, R: 0, M: 0, A: 0, B: 0 };
          state.rawScores = { nA_P: 0, nB_P: 0, nA_V: 0, nB_V: 0, nA_I: 0, nB_I: 0, nA_E: 0, nB_E: 0 };
          state.beta = { P: 0.5, V: 0.5, I: 0.5, E: 0.5 };
          state.fingerprint = {};
          state.phase = 'cover';
          render();
        });
      }

      if (state.phase === 'result') {
        setTimeout(() => {
          const bar = document.getElementById('niuMaBar');
          if (bar) {
            bar.style.width = calculateNiuMa() + '%';
          }
        }, 300);
      }
    }

    function handleAnswer(option) {
      const q = state.testQuestions[state.currentQuestion];
      state.answers[state.currentQuestion] = option;

      const dim = q.dimension;
      const letterMap = { P: ['E', 'I'], V: ['S', 'D'], I: ['R', 'M'], E: ['A', 'B'] };

      if (option === 0) {
        state.scores[letterMap[dim][0]]++;
        state.rawScores[`nA_${dim}`]++;
      } else if (option === 1) {
        state.scores[letterMap[dim][1]]++;
        state.rawScores[`nB_${dim}`]++;
      }

      if (state.currentQuestion < 31) {
        state.currentQuestion++;
        document.getElementById('app').innerHTML = renderTest();
        attachEvents();
      } else {
        calculateBeta();
        calculateFingerprint();
        state.phase = 'result';
        render();
      }
    }

    render();
  </script>
</body>
</html>
