    :root {
      --primary: #8B5CF6;
      --secondary: #06B6D4;
      --accent: #F472B6;
      --bg: #0F0F1A;
      --surface: #1A1A2E;
      --text: #F8FAFC;
      --text-secondary: #94A3B8;
      --orange: #F59E0B;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .font-cyber { font-family: 'Orbitron', monospace; }

    /* Neon glow effects */
    .neon-purple { text-shadow: 0 0 10px var(--primary), 0 0 30px var(--primary), 0 0 60px var(--primary); }
    .neon-cyan { text-shadow: 0 0 10px var(--secondary), 0 0 30px var(--secondary); }
    .neon-pink { text-shadow: 0 0 10px var(--accent), 0 0 30px var(--accent); }
    .neon-orange { text-shadow: 0 0 10px var(--orange), 0 0 30px var(--orange); }

    .glow-border {
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.3), inset 0 0 15px rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.5);
    }
    .glass {
      background: rgba(26, 26, 46, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Animations */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 5px var(--primary), 0 0 20px var(--primary); }
      50% { box-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeInUp { animation: fadeInUp 0.4s ease-out forwards; }
    .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .animate-float { animation: float 3s ease-in-out infinite; }

    /* Option buttons */
    .option-btn {
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
    }
    .option-btn:hover {
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
      transform: scale(1.02);
    }
    .option-btn.selected {
      background: rgba(139, 92, 246, 0.3);
      border-color: var(--primary);
      box-shadow: 0 0 25px rgba(139, 92, 246, 0.5);
    }

    /* Progress bar */
    .progress-fill {
      transition: width 0.4s ease;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }

    /* Tags */
    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 0.75rem;
      margin: 4px;
      animation: fadeInUp 0.3s ease-out forwards;
      opacity: 0;
    }

    /* Result code letters */
    .result-letter {
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 900;
      display: inline-block;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
  
  </style>

  <script>

    // ============ DATA ============
    const questions = [

      {
        text: `看到微博热搜第一极其离谱，你的赛博反应是：`,

      {
        text: `你的朋友圈/社交账号日常状态更像：`,
        options: [
          `赛博暴露狂，拉个屎都要配三张不同滤镜的照片`,

        text: `刷短视频看到一个极其逆天的迷惑操作，你会：`,

          `在评论区疯狂艾特你那三个冤种朋友并打出"@张三 出来学"`,
          `默默长按点赞，让这坨答辩推给更多无辜的人`,
          `脑子里闪过一句"神经病"就划走了`

      {
        text: `你的浏览器收藏夹和浏览记录如果被曝光：`,
        options: [
          `无所谓，甚至可以开个直播给大家挨个讲解我的冲浪轨迹`,
          `我会立刻嚼碎手机咽下去，带着我的赛博秘密火化`,
          `没什么见不得人的，全在隐身模式下看的`
        ]
      },
      {
        text: `正在激情打游戏，突然遇到队友疯狂送人头：`,
        options: [
          `立刻开麦化身导师，教他做人、教他认字、教他如何重装系统`,
          `闭麦，听歌，把队友当成游戏里的高级AI怪物`,
          `直接退出游戏，去吃顿好的`
        ]
      },
      {
        text: `如果你发了一条状态，半小时了连个点赞都没有，你会：`,
        options: [
          `觉得非常没面子，立刻删掉，反思自己哪里发挥失常`,
          `无所谓，我发出来本来就是给自己当赛博日记看的`,
          `强迫身边的狗给按个赞`
        ]
      },
      {
        text: `当你混进一个完全不懂的圈子（比如你是个直男混进了美妆群）：`,
        options: [
          `大胆开麦："家人们，肥皂洗脸有什么问题吗？"`,
          `潜水苟住，暗中观察，偷偷窃取行业机密`,
          `待两分钟嫌吵，直接退群`
        ]
      },
      // Q9-16 内核维度 (S/D)
      {
        text: `刷到一条BGM极其煽情、主角极其惨的视频：`,

          `瞬间眼眶湿润，含泪打下"陌生人，祝你幸福"`,

      {
        text: `娱乐圈顶流突然被爆出塌房大瓜，你的反应是：`,

          `信仰崩塌！怒写小作文痛斥渣男/渣女，大呼再也不相信爱情了`,

        text: `对于"年轻人到底该卷还是该躺"的旷世难题，你的态度是：`,

                    return `
                      <button class="option-btn w-full text-left px-4 py-3 rounded-xl text-sm md:text-base ${colors[idx]} transition-all" data-option="${idx}">
                        <span class="font-cyber font-bold mr-2">${letters[idx]}.</span>
                        ${opt}
                      </button>
                    `;
                  }).join('')}
                </div>
              </div>
            </div>
          </div>

          <div class="flex items-center justify-between mt-4 px-4">
            <button id="prevBtn" class="text-xs text-gray-500 hover:text-purple-400 transition-colors ${state.currentQuestion === 0 ? 'opacity-0 pointer-events-none' : ''}">← 上一题</button>
            <span class="text-xs text-gray-600">选择后自动进入下一题</span>
          </div>
        </div>
      `;
    }

    function renderResult() {
      const result = calculateResult();
      const p = personalityTypes[result];

      return `
        <div class="min-h-screen overflow-y-auto">
          <div class="px-4 py-8 md:py-12 text-center">
            <p class="text-gray-500 text-sm mb-2 animate-fadeInUp">你的赛博人格是</p>
            <div class="mb-2 animate-fadeInUp" style="animation-delay: 0.1s">
              ${renderResultCode(result)}
            </div>
            <h1 class="text-2xl md:text-3xl font-cyber font-bold neon-purple animate-fadeInUp" style="animation-delay: 0.2s">
              ${p.name}
            </h1>
          </div>

          <div class="max-w-lg mx-auto px-4 pb-12 space-y-6">
            <div class="glass glow-border rounded-2xl p-5 animate-fadeInUp" style="animation-delay: 0.3s">
              <h3 class="text-sm text-gray-400 mb-3 flex items-center gap-2">
                <span>🏷️</span> 标签云
              </h3>
              <div class="flex flex-wrap">
                ${p.tags.map((tag, i) => `
                  <span class="tag text-white" style="animation-delay: ${0.4 + i * 0.1}s; background: ${['#8B5CF6', '#06B6D4', '#F472B6', '#F59E0B'][i % 4]}">
                    ${tag}
                  </span>
                `).join('')}
              </div>
            </div>

            <div class="glass glow-border rounded-2xl p-5 animate-fadeInUp" style="animation-delay: 0.5s">
              <h3 class="text-sm text-gray-400 mb-3 flex items-center gap-2">
                <span>📝</span> 扎心画像
              </h3>
              <p class="text-gray-200 leading-relaxed">${p.profile}</p>
            </div>

            <div class="glass glow-border rounded-2xl p-5 animate-fadeInUp" style="animation-delay: 0.6s">
              <h3 class="text-sm text-gray-400 mb-3 flex items-center gap-2">
                <span>🔗</span> 社交关系
              </h3>
              <div class="space-y-3">
                <div class="flex items-start gap-3">
                  <span class="text-green-400 mt-0.5">💕</span>
                  <div>
                    <div class="text-xs text-gray-500 mb-1">天生一对</div>
                    <div class="text-sm">${p.match} — ${personalityTypes[p.match].name}</div>
                  </div>
                </div>
                <div class="flex items-start gap-3">
                  <span class="text-red-400 mt-0.5">⚔️</span>
                  <div>
                    <div class="text-xs text-gray-500 mb-1">宿命之敌</div>
                    <div class="text-sm">${p.rival} — ${personalityTypes[p.rival].name}</div>
                  </div>
                </div>
              </div>
            </div>

            <div class="glass glow-border rounded-2xl p-5 animate-fadeInUp" style="animation-delay: 0.7s">
              <h3 class="text-sm text-gray-400 mb-3 flex items-center gap-2">
                <span>🐴</span> 牛马指数
              </h3>
              <div class="mb-3">
                <div class="flex justify-between text-xs text-gray-500 mb-1">
                  <span>打工魂</span>
                  <span>${p.niuMa}%</span>
                </div>
                <div class="h-3 bg-gray-800 rounded-full overflow-hidden">
                  <div class="h-full bg-gradient-to-r from-orange-500 to-red-500 rounded-full transition-all duration-1000" style="width: 0%" id="niuMaBar"></div>
                </div>
              </div>
              <p class="text-xs text-gray-400">你的灵魂含吗喽量：<span class="text-orange-400 font-bold">${p.niuMa}%</span></p>
            </div>

            <button id="restartBtn" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-full font-bold text-lg hover:scale-[1.02] transition-transform cursor-pointer border-0 animate-fadeInUp" style="animation-delay: 0.8s">
              🔄 重新测试
            </button>
          </div>
        </div>
      `;
    }

    function renderResultCode(code) {
      const colors = ['neon-purple', 'neon-cyan', 'neon-pink', 'neon-orange'];
      return code.split('').map((letter, i) => `
        <span class="result-letter font-cyber ${colors[i]}">${letter}</span>
      `).join('');
    }

    function attachEvents() {
      const startBtn = document.getElementById('startBtn');
      if (startBtn) {
        startBtn.addEventListener('click', () => {
          state.phase = 'test';
          state.shuffledQuestions = [...questions].sort(() => Math.random() - 0.5);
          render();
        });
      }

      const optionBtns = document.querySelectorAll('.option-btn');
      optionBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const option = parseInt(btn.dataset.option);
          handleAnswer(option);
        });
      });

      const prevBtn = document.getElementById('prevBtn');
      if (prevBtn) {
        prevBtn.addEventListener('click', () => {
          if (state.currentQuestion > 0) {
            // 恢复上一题的分数
            const prevAnswer = state.answers[state.currentQuestion - 1];
            if (prevAnswer !== null) {
              const dimIndex = Math.floor((state.currentQuestion - 1) / 8);
              const letterMap = [['E', 'I'], ['S', 'D'], ['R', 'M'], ['A', 'B']];
              if (prevAnswer === 0) state.scores[letterMap[dimIndex][0]]--;
              else if (prevAnswer === 1) state.scores[letterMap[dimIndex][1]]--;
            }
            state.currentQuestion--;
            document.getElementById('app').innerHTML = renderTest();
            attachEvents();
          }
        });
      }

      const restartBtn = document.getElementById('restartBtn');
      if (restartBtn) {
        restartBtn.addEventListener('click', () => {
          state.currentQuestion = 0;
          state.answers = new Array(32).fill(null);
          state.scores = { E: 0, I: 0, S: 0, D: 0, R: 0, M: 0, A: 0, B: 0 };
          state.phase = 'cover';
          render();
        });
      }

      if (state.phase === 'result') {
        setTimeout(() => {
          const result = calculateResult();
          const p = personalityTypes[result];
          const bar = document.getElementById('niuMaBar');
          if (bar) {
            bar.style.width = p.niuMa + '%';
          }
        }, 300);
      }
    }

    function handleAnswer(option) {
      state.answers[state.currentQuestion] = option;

      const qIndex = state.currentQuestion;
      const dimIndex = Math.floor(qIndex / 8);
      const letterMap = [
        ['E', 'I'],
        ['S', 'D'],
        ['R', 'M'],
        ['A', 'B']
      ];

      if (option === 0) {
        state.scores[letterMap[dimIndex][0]]++;
      } else if (option === 1) {
        state.scores[letterMap[dimIndex][1]]++;
      }

      if (state.currentQuestion < 31) {
        state.currentQuestion++;
        const app = document.getElementById('app');
        app.innerHTML = renderTest();
        attachEvents();
      } else {
        state.phase = 'result';
        render();
      }
    }

    function calculateResult() {
      const { scores } = state;
      const letter1 = scores.E > scores.I ? 'E' : (scores.E < scores.I ? 'I' : 'I');
      const letter2 = scores.S > scores.D ? 'S' : (scores.S < scores.D ? 'D' : 'D');
      const letter3 = scores.R > scores.M ? 'R' : (scores.R < scores.M ? 'M' : 'M');
      const letter4 = scores.A > scores.B ? 'A' : (scores.A < scores.B ? 'B' : 'B');
      return letter1 + letter2 + letter3 + letter4;
    }

    render();
  



  
  </script>
</body>
</html>
